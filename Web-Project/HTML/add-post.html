<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Post</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      /* ===== Add Post Page Styles ===== */
      .add-post-container {
        max-width: 600px;
        margin: 30px auto 100px auto;
        padding: var(--spacing-md);
      }

      .add-post-header {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .add-post-header h2 {
        color: var(--color-primary-dark);
        font-size: 1.4rem;
      }

      .back-btn {
        background: none;
        border: none;
        color: var(--color-primary-dark);
        font-size: 1.3rem;
        cursor: pointer;
        padding: var(--spacing-xs);
        border-radius: var(--radius-sm);
        transition: background-color 0.2s;
      }

      .back-btn:hover {
        background-color: var(--color-secondary);
      }

      /* ===== Image Upload Zone ===== */
      .upload-zone {
        border: 2.5px dashed var(--color-primary);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xl);
        text-align: center;
        cursor: pointer;
        transition: background-color 0.2s, border-color 0.2s;
        background-color: var(--color-white);
        margin-bottom: var(--spacing-md);
        position: relative;
      }

      .upload-zone:hover,
      .upload-zone.drag-over {
        background-color: var(--color-secondary);
        border-color: var(--color-primary-dark);
      }

      .upload-zone i {
        font-size: 2.5rem;
        color: var(--color-primary);
        margin-bottom: var(--spacing-sm);
        display: block;
      }

      .upload-zone p {
        color: var(--color-text-light);
        font-size: 0.9rem;
      }

      .upload-zone p strong {
        color: var(--color-primary-dark);
      }

      #imageInput {
        display: none;
      }

      /* ===== Image Preview Carousel ===== */
      .preview-section {
        display: none;
        margin-bottom: var(--spacing-md);
      }

      .preview-section.has-images {
        display: block;
      }

      .carousel-wrapper {
        position: relative;
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: #000;
        aspect-ratio: 1 / 1;
        margin-bottom: var(--spacing-sm);
      }

      .carousel-track {
        display: flex;
        height: 100%;
        transition: transform 0.35s ease;
      }

      .carousel-slide {
        min-width: 100%;
        height: 100%;
        position: relative;
      }

      .carousel-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .carousel-slide .remove-img-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.6);
        color: white;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s;
      }

      .carousel-slide .remove-img-btn:hover {
        background: rgba(200,0,0,0.8);
      }

      /* Prev / Next arrows */
      .carousel-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255,255,255,0.85);
        border: none;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 1rem;
        color: var(--color-primary-dark);
        cursor: pointer;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-sm);
        transition: background-color 0.2s;
      }

      .carousel-arrow:hover {
        background: white;
      }

      .carousel-arrow.prev { left: 10px; }
      .carousel-arrow.next { right: 10px; }

      .carousel-arrow.hidden { display: none; }

      /* Dots */
      .carousel-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-bottom: var(--spacing-sm);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-light-grey);
        cursor: pointer;
        transition: background-color 0.2s, transform 0.2s;
        border: none;
        padding: 0;
      }

      .dot.active {
        background: var(--color-primary);
        transform: scale(1.2);
      }

      /* Image count badge */
      .img-count-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.55);
        color: white;
        font-size: 0.75rem;
        padding: 3px 9px;
        border-radius: var(--radius-lg);
        pointer-events: none;
      }

      /* Add more images button inside preview */
      .add-more-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--spacing-sm);
        width: 100%;
        padding: var(--spacing-sm) var(--spacing-md);
        background: transparent;
        color: var(--color-primary-dark);
        border: 2px solid var(--color-primary-dark);
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: var(--spacing-md);
        transition: background-color 0.2s, color 0.2s;
      }

      .add-more-btn:hover {
        background: var(--color-primary-dark);
        color: white;
      }

      /* ===== Post Form Card ===== */
      .post-form-card {
        background: var(--color-white);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
        box-shadow: var(--shadow-sm);
      }

      .post-form-card textarea {
        width: 100%;
        min-height: 100px;
        border: 2px solid var(--color-secondary);
        border-radius: var(--radius-md);
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 0.95rem;
        font-family: inherit;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        background: var(--color-background);
        color: var(--color-text);
      }

      .post-form-card textarea:focus {
        border-color: var(--color-primary-dark);
      }

      .char-counter {
        text-align: right;
        font-size: 0.78rem;
        color: var(--color-text-light);
        margin-top: 4px;
        margin-bottom: var(--spacing-md);
      }

      .char-counter.over {
        color: red;
      }

      .submit-post-btn {
        width: 100%;
        padding: var(--spacing-sm) var(--spacing-md);
        background: var(--color-primary);
        color: white;
        border: none;
        border-radius: var(--radius-lg);
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.15s;
      }

      .submit-post-btn:hover {
        background: var(--color-primary-dark);
        transform: translateY(-2px);
      }

      .submit-post-btn:active {
        background: var(--color-primary-darker);
        transform: translateY(0);
      }

      .submit-post-btn:disabled {
        background: var(--color-light-grey);
        cursor: not-allowed;
        transform: none;
      }

      /* Success toast */
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--color-primary-dark);
        color: white;
        padding: var(--spacing-sm) var(--spacing-lg);
        border-radius: var(--radius-lg);
        font-size: 0.9rem;
        font-weight: 600;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.3s;
        z-index: 9999;
        box-shadow: var(--shadow-md);
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* Responsive */
      @media (min-width: 1024px) {
        .add-post-container {
          margin-top: 40px;
          padding-left: 100px;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <div class="add-post-container">

        <!-- Header -->
        <div class="add-post-header">
          <button class="back-btn" onclick="window.history.back()" title="Go back">
            <i class="fa-solid fa-angle-left"></i>
          </button>
          <h2>New Post</h2>
        </div>

        <!-- Image Upload Zone (shown when no images selected) -->
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="imageInput" accept="image/*" multiple />
          <i class="fa-regular fa-images"></i>
          <p><strong>Tap to add photos</strong></p>
          <p>or drag and drop here</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Supports JPG, PNG, GIF, WebP</p>
        </div>

        <!-- Image Preview Section -->
        <div class="preview-section" id="previewSection">

          <div class="carousel-wrapper" id="carouselWrapper">
            <div class="carousel-track" id="carouselTrack"></div>
            <span class="img-count-badge" id="imgCountBadge">1 / 1</span>
            <button class="carousel-arrow prev hidden" id="prevArrow" onclick="changeSlide(-1)">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="carousel-arrow next hidden" id="nextArrow" onclick="changeSlide(1)">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>

          <div class="carousel-dots" id="carouselDots"></div>

          <button class="add-more-btn" onclick="document.getElementById('imageInput').click()">
            <i class="fa-solid fa-plus"></i> Add more photos
          </button>
        </div>

        <!-- Caption & Submit -->
        <div class="post-form-card">
          <textarea
            id="captionInput"
            placeholder="Write a caption..."
            maxlength="2200"
            oninput="updateCharCount()"
          ></textarea>
          <div class="char-counter" id="charCounter">0 / 2200</div>
          <button class="submit-post-btn" id="submitBtn" onclick="submitPost()">
            Share Post
          </button>
        </div>

      </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <footer>
      <nav>
        <a href="feed.html">
          <i class="fa-solid fa-house"></i>
          <span class="nav-text">Home</span>
        </a>
        <a href="add-post.html" class="add-btn" aria-label="Add post">
          <i class="fas fa-plus"></i>
          <span class="nav-text">Post</span>
        </a>
        <a href="profile-page.html">
          <i class="fa-regular fa-user"></i>
          <span class="nav-text">Profile</span>
        </a>
      </nav>
    </footer>

    <script src="../JS/add-post.js"></script>
  </body>
</html>
