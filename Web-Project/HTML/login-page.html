<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="h2F">Login</h2>

      <form action="#" method="post">
        <label class="lableF" for="email">Email<span class="required"> *</span></label>
        <input class="inputF" id="email" type="email" placeholder="Enter Your Email" required />
        <label class="lableF" for="password">Password<span class="required"> *</span></label>
        <input class="inputF" id="password" type="password" placeholder="Enter Your Password" required />

        <button class="buttonF" type="submit">Login</button>

        <p class="switch"> Don't have an account? <a href="registeration-page.html">Register</a> </p>
      </form>
    </div>
  </body>
</html>
