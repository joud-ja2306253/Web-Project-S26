<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Page</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <header class="header"></header>
    <div class="container">
      <main class="main">
        <div class="profile-info-container">
          <div class="profile-info">
            <div class="top-field">
              <img class="profile-pic" alt="profile picture" />
              <div class="top-row">
                <div class="names">
                  <h3 class="displayName"></h3>
                  <p class="username"></p>
                </div>

                <div>
                  <button class="follow-btn" id="followBtn" type="button">
                    <i class="fas fa-plus"></i>Follow
                  </button>

                  <!-- should dim the page (css) & detect clicks outside of the page to close the panel -->
                  <div id="overlay"></div>

                  <button class="settingsBtn" id="settingsBtn" type="button">
                    Settings
                  </button>
                  <!-- dont add anything between settingsBtn and settingsPanel as they should stay siblings -->
                  <div id="settingsPanel">
                    <div class="editProfileTop">
                      <button id="closeBtn">
                        <i class="fa-solid fa-angle-left"></i>
                      </button>
                      <p>Edit Profile</p>
                    </div>

                    <!-- Profile Picture -->
                    <div class="editProfilePicContainer">
                      <img class="editProfilePic" alt="profile picture" />
                      <label for="changePhoto" class="changePhoto"
                        >Change Photo</label
                      >
                      <input type="file" id="changePhoto" hidden />
                    </div>

                    <!-- Username -->
                    <div class="editRow">
                      <label for="editUsername">Username</label>
                      <input id="editUsername" type="text" class="editInput" />
                    </div>

                    <!-- Name -->
                    <div class="editRow">
                      <label for="editDisplayName">Name</label>
                      <input
                        id="editDisplayName"
                        type="text"
                        class="editInput"
                      />
                    </div>

                    <!-- Bio -->
                    <div class="editRow">
                      <label for="editBio">Bio</label>
                      <input
                        id="editBio"
                        type="text"
                        class="editInput"
                        placeholder="Your bio should go here"
                      />
                    </div>

                    <div class="saveBtnWrapper">
                      <button id="saveBtn" type="button">Save</button>
                    </div>
                    <div class="logoutBtn">
                      <button id="logoutBtn" type="button">Logout</button>
                    </div>
                  </div>

                  <!-- editPanel -->
                </div>
              </div>
              <!-- top-row -->
            </div>
            <!-- top-field  -->

            <div class="bio">
              <p></p>
            </div>

            <div class="profile-data">
              <!-- <div>
                <p>10</p>
                <p class="labeling">Posts</p>
              </div>
              <div>
                <p>67</p>
                <p class="labeling">Followers</p>
              </div>
              <div>
                <p>15</p>
                <p class="labeling">Following</p>
              </div> -->
            </div>
            <!-- profile data -->
          </div>
          <!-- profile info -->
        </div>

        <!-- Posts -->
        <div class="feed-container">
          <div id="postsContainer"></div>
        </div>
      </main>
      <aside class="side"></aside>

      <footer>
        <nav>
          <a href="feed.html"
            ><i class="fa-regular fa-house"></i>
            <!-- <i class="fa-solid fa-house"></i> -->
            <span class="nav-text">Home</span>
          </a>
          <a href="add-post.html" class="add-btn" aria-label="Add post">
            <i class="fas fa-plus"></i>
            <span class="nav-text">Post</span>
          </a>
          <a href="profile-page.html">
            <!-- <i class="fa-regular fa-user"></i> -->
            <i class="fa-solid fa-user"></i>
            <span class="nav-text">Profile</span>
          </a>
        </nav>
      </footer>
    </div>
    <script src="../JS/feed.js"></script>

    <script src="../JS/profile-page.js"></script>
  </body>
</html>
