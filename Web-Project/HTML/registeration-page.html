<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
  </head>
  <body>
    <div class="container">
      <h2>Registeration</h2>

      <form action="#">
        <fieldset>
          <legend>Create Account</legend>
          <label for="fname">First Name*</label>
          <input id="fname" type="text" placeholder="Enter Your First Name" required />
          <label for="lname">Last Name*</label>
          <input id="lname" type="text" placeholder="Enter Your Last Name" required />
          <label for="email"> Email*</label>
          <input id="email" type="email" placeholder="Enter Your Email" required />
          <label for="password">Password*</label>
          <input id="password" type="password" placeholder="Enter Your Password" required />
          <label for="conf_password">Confirm Password*</label>
          <input id="conf_password" type="password" placeholder="Enter Your Password Again" required />
        </fieldset>
        
        <button type="submit">Register</button>

        <p class="switch">Already have an account? <a href="login-page.html">Login</a></p>
      </form>
    </div>
  </body>
</html>
