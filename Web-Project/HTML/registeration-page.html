<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <link rel="stylesheet" href="../CSS/styles.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="h2F">Registeration</h2>

      <form action="#">
        <fieldsetF>
          <legend>Create Account</legend>

         
          <label class="labelF" for="fname">First Name<span class="requiredF"> *</span></label>
          <input class="inputF" id="fname" type="text" placeholder="Enter Your First Name" required />
          <label class="labelF" for="lname">Last Name<span class="requiredF"> *</span></label>
          <input class="inputF" id="lname" type="text" placeholder="Enter Your Last Name" required />
          <label class="labelF" for="email"> Email<span class="requiredF"> *</span></label>
          <input class="inputF" id="email" type="email" placeholder="Enter Your Email" required />
          <label class="labelF" for="password">Password<span class="requiredF"> *</span></label>
          <input class="inputF" id="password" type="password" placeholder="Enter Your Password" required />
          <label class="labelF" for="conf_password">Confirm Password<span class="requiredF"> *</span></label>
          <input class="inputF" id="conf_password" type="password" placeholder="Enter Your Password Again" required />
        </fieldsetF>
        
        <button class="buttonF" type="submit">Register</button>

        <p class="switch">Already have an account? <a href="login-page.html">Login</a></p>
      </form>
    </div>
  </body>
</html>
